pull_request_rules:
  - name: Automatic merge for Dependabot updates
    conditions:
      - author=dependabot[bot]
      - label!=do-not-merge
    actions:
      merge:
        method: merge

  - name: Delete head branch after merge
    conditions:
      - merged
    actions:
      delete_head_branch: {}

  - name: Label draft / WIP pull requests
    conditions:
      - or:
        - draft=true
        - title~=^(\[WIP\]|WIP[:\s])
    actions:
      label:
        add:
          - work-in-progress

  - name: Remove work-in-progress label when ready
    conditions:
      - draft=false
      - title!~=^(\[WIP\]|WIP[:\s])
      - label=work-in-progress
    actions:
      label:
        remove:
          - work-in-progress
